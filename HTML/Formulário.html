<html>

<head>
    <title> Formulário </title>
    <link rel="stylesheet" href="../CSS/style-formulario.css">
</head>

<body id="fundo">
    <form action="./resultado.html" class="form">
        <label class="textlabel"> Nome: </label>
        <input class="campotexto" type="text" placeholder="Seu Nome">
        <br>
        <label class="textlabel"> Data de Nascimento: </label>
        <input class="campotexto" type="date" placeholder="00/00/0000">
        <br>
        <label class="textlabel"> E-mail: </label>
        <input class="campotexto" type="email" placeholder="Seu E-mail">
        <br>
        <label class="textlabel"> País: </label>
        <input class="campotexto" type="text" placeholder="País">
        <br>
        <label class="textlabel"> Jogador favorito: </label>
        <input class="campotexto" type="text" placeholder="Seu jogador favorito">
        <br>
        <button id="benviar" type="submit"> Enviar </button>
    </form>
            
</body>


</html>
